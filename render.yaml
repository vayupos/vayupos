services:
  # Backend API Service
  - type: web
    name: vayupos-backend
    env: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vayupos-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION
        value: 3600
      - key: DEBUG
        value: False
      - key: API_V1_STR
        value: /api/v1
      - key: PROJECT_NAME
        value: VayuPos - POS System
    
  # Frontend Service
  - type: web
    name: vayupos-frontend
    env: node
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# Database
databases:
  - name: vayupos-db
    region: oregon
    databaseName: vayupos
    user: vayupos_user
    plan: starter
