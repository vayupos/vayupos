# /etc/nginx/sites-available/vayupos-api
# Symlink to sites-enabled:
#   sudo ln -s /etc/nginx/sites-available/vayupos-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name api.vayupos.com;

    # After certbot runs, it will add the SSL block automatically.
    # Leave this HTTP block as-is — certbot will modify it.

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
